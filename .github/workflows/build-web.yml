name: Build Web Server

on:
  push:
    branches: [master]
    paths:
      - 'mmex.net.core/**'
      - 'mmex.net.webServer/**'
      - 'Dockerfile'
  pull_request:
    branches: [master]
    paths:
      - 'mmex.net.core/**'
      - 'mmex.net.webServer/**'
      - 'Dockerfile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore mmex.net.webServer/mmex.net.webServer.csproj

      - name: Build
        run: dotnet build mmex.net.webServer/mmex.net.webServer.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish mmex.net.webServer/mmex.net.webServer.csproj -c Release -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmex-web-server
          path: publish/

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mmex-web .
