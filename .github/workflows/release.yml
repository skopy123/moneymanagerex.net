name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-winform:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained)
        run: dotnet publish mmex.net.winform/mmex.net.winform.csproj -c Release -r win-x64 --self-contained -o publish-winform

      - name: Zip release
        run: Compress-Archive -Path publish-winform/* -DestinationPath mmex-winform-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmex-winform-win-x64
          path: mmex-winform-win-x64.zip

  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish mmex.net.webServer/mmex.net.webServer.csproj -c Release -o publish-web

      - name: Zip release
        run: cd publish-web && zip -r ../mmex-web-server.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmex-web-server
          path: mmex-web-server.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-winform, build-web]

    steps:
      - name: Download WinForms artifact
        uses: actions/download-artifact@v4
        with:
          name: mmex-winform-win-x64

      - name: Download Web Server artifact
        uses: actions/download-artifact@v4
        with:
          name: mmex-web-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mmex-winform-win-x64.zip
            mmex-web-server.zip
